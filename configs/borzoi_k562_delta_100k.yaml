seed: 42
task: k562_delta
assets_config: configs/borzoi_assets.local.yaml
delta_labels_path: /extra/zhanglab1/INDV/dongbos/Pocket-borzoi-ICLR/interim/teacher_cache/k562_delta_labels.parquet
fasta_path: /path/to/hg38.fa
output_dir: /extra/zhanglab1/INDV/dongbos/Pocket-borzoi-ICLR/results/runs
run_name: k562_delta_100k_8kb
data:
  local_context_len: 8192
  target_standardize: true
  metadata_features: true
  augment_rc: false
model:
  preset: delta_tiny_100k
  channels: 64
  num_blocks: 5
  stem_stride: 4
  dropout: 0.1
  head_hidden: 128
train:
  batch_size: 64
  num_workers: 4
  max_epochs: 50
  lr: 3e-4
  weight_decay: 1e-4
  loss: huber
  huber_delta: 1.0
  sample_weighting: false
  sign_loss_weight: 0.0
  rank_loss_weight: 0.0
  optimizer: adamw
  scheduler: cosine
  early_stopping_patience: 8
  grad_clip_norm: 1.0
  device: auto
  allow_local: false
eval:
  top_effect_quantiles: [0.9, 0.95, 0.99]
  per_gene_topk: true
  save_predictions: true
  save_plots: true
