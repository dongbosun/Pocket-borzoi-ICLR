cluster:
  backend: slurm
  conda_env: pocketreg_borzoi
  conda_sh: ~/miniconda3/etc/profile.d/conda.sh
  log_dir: /extra/zhanglab1/INDV/dongbos/Pocket-borzoi-ICLR/logs/slurm
  scratch_env_vars: [SLURM_TMPDIR, TMPDIR]

jobs:
  teacher_inference:
    gres: gpu:1
    cpus_per_task: 8
    mem: 64G
    time: "08:00:00"
