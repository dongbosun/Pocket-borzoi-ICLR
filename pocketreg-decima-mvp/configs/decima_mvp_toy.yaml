seed: 13
manifest_path: outputs/smoke/manifest.parquet
fasta_path: outputs/smoke/toy.fa
output_dir: outputs/runs/toy
context_len: 4096
model:
  preset: tiny_100k
  channels: 24
  num_blocks: 3
  kernel_size: 3
  stem_stride: 8
  pool_every: 2
  dropout: 0.05
  head_hidden: 48
  norm: groupnorm
train:
  batch_size: 16
  num_workers: 0
  max_epochs: 2
  lr: 0.001
  weight_decay: 0.0001
  loss: huber
  huber_delta: 1.0
  optimizer: adamw
  scheduler: cosine
  early_stopping_patience: 3
  grad_clip_norm: 1.0
  amp: false
  device: cpu
  target_standardize: true
eval:
  metrics: [pearson, spearman, r2, mae, rmse]
logging:
  log_every_n_steps: 10
  save_plots: true
  save_predictions: true
