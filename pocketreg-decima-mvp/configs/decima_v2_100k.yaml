seed: 13
manifest_path: data/processed/decima_v2/manifest.parquet
fasta_path: data/raw/hg38/hg38.fa
output_dir: outputs/runs/decima_v2
context_len: 65536
model:
  preset: tcn_tiny
  channels: 64
  num_blocks: 6
  kernel_size: 7
  stem_kernel_size: 17
  stem_stride: 8
  pool_every: 2
  dropout: 0.1
  head_hidden: 128
  norm: batchnorm
train:
  batch_size: 16
  num_workers: 4
  eval_num_workers: 2
  max_epochs: 50
  lr: 0.0003
  weight_decay: 0.0001
  loss: huber
  huber_delta: 1.0
  scheduler: cosine
  early_stopping_patience: 8
  grad_clip_norm: 1.0
  amp: true
  device: auto
  cache_size: 512
  final_loss_weight: 1.0
  rep_loss_weight: 0.25
  aux_loss_weight: 0.1
  residual_loss_weight: 0.2
  mid_loss_weight: 0.1
logging:
  save_plots: true
  save_predictions: true
