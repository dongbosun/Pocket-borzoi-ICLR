seed: 13
manifest_path: outputs/smoke_v2/manifest.parquet
fasta_path: outputs/smoke_v2/toy.fa
output_dir: outputs/runs/smoke_v2
context_len: 4096
model:
  preset: tcn_tiny
  channels: 16
  num_blocks: 2
  kernel_size: 5
  stem_kernel_size: 15
  stem_stride: 8
  pool_every: 2
  dropout: 0.05
  head_hidden: 32
  norm: groupnorm
train:
  batch_size: 16
  num_workers: 0
  eval_num_workers: 0
  max_epochs: 2
  lr: 0.001
  weight_decay: 0.0001
  loss: huber
  huber_delta: 1.0
  scheduler: cosine
  early_stopping_patience: 3
  grad_clip_norm: 1.0
  amp: false
  device: cpu
  cache_size: 64
  final_loss_weight: 1.0
  rep_loss_weight: 0.2
  aux_loss_weight: 0.1
  residual_loss_weight: 0.2
  mid_loss_weight: 0.0
logging:
  save_plots: true
  save_predictions: true
